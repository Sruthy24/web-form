<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <form id="registrationForm">

        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>

        <label>Email</label>
        <input type="email" id="email" placeholder="example@email.com" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters" required>

        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="9876543210" required>

        <label>Date of Birth</label>
        <input type="date" id="dob" required>

        <label>Age</label>
        <input type="number" id="age" min="16" max="60" required>

        <label>Gender</label>
        <div class="radio-group">
            <label><input type="radio" name="gender" required> Male</label>
            <label><input type="radio" name="gender"> Female</label>
            <label><input type="radio" name="gender"> Other</label>
        </div>

        <label>Course</label>
        <select id="course" required>
            <option value="">Select Course</option>
            <option>Web Development</option>
            <option>Python</option>
            <option>Java</option>
            <option>Data Science</option>
        </select>

        <label>Upload Resume</label>
        <input type="file" id="resume" required>

        <label>Website</label>
        <input type="url" id="website" placeholder="https://example.com">

        <label>Favorite Color</label>
        <input type="color">

        <label>
            <input type="checkbox" required>
            I agree to the Terms & Conditions
        </label>

        <button type="submit">Register</button>

    </form>

    <p id="message"></p>
</div>

<script src="script.js"></script>

</body>
</html>
